{% extends 'base.html' %}
{% load static %}
{% block title %}Firanda Profile - Galeri{% endblock %}

{% block content %}
    <div class="galeri-grid">
      <h2 class="section-title">Kumpulan foto</h2>
      <div class="card">
        <img src="{% static 'images/Shiners.jpg' %}" alt="Tim Futsal" />
        <p>Eskul Futsal SMAIT.</p>
      </div>
      <div class="card">
        <img src="{% static 'images/Friends.jpg' %}" alt="Foto santri hari jum'at" />
        <p>Foto besama saat hari jum'at.</p>
      </div>
      <div class="card">
        <img src="{% static 'images/Masjid Ar Royyan.jpg' %}" alt="Masjid Ar Royyan" />
        <p>Masjid Ar Royyan dari samping.</p>
      </div>
    </div>

    <!-- Karya Video -->
    <div class="video-wrapper">
      <h2 class="section-title">Karya Video</h2>
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/Dw0JP0CuMIM?si=ZDoN67Vv5SjUyu2U"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
{% endblock %}
